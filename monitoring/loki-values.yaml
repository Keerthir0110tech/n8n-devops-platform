# helm install loki grafana/loki-stack -n monitoring -f loki-values.yaml
# Deploys Loki + Promtail together; Promtail tails container logs on every
# node and ships them to Loki, tagged with namespace/pod/container labels.

loki:
  persistence:
    enabled: true
    size: 20Gi
  config:
    limits_config:
      retention_period: 336h   # 14 days

promtail:
  config:
    snippets:
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
